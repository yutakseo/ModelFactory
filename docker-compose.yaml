name: modelfactory

services:
  huggingface:
    build:
      context: .
      dockerfile: huggingface/Dockerfile
    image: huggingface:latest
    container_name: huggingface
    working_dir: /workspace
    ipc: host
    stdin_open: true
    tty: true
    shm_size: "128gb"
    gpus: all
    environment:
      HF_HOME: /workspace/.cache/huggingface
      HF_HUB_CACHE: /workspace/.cache/huggingface/hub
      HF_DATASETS_CACHE: /workspace/.cache/huggingface/datasets
      HF_TOKEN: ${HF_TOKEN:-}
    volumes:
      - ./huggingface:/workspace
      - /mnt/datasets:/datasets
    command: sleep infinity

  triton:
    build:
      context: .
      dockerfile: triton/Dockerfile
    image: triton-inference-server:latest
    container_name: triton
    ipc: host
    shm_size: "64gb"
    gpus: all
    ulimits:
      memlock: -1
    environment:
      HF_HOME: /root/.cache/huggingface
      HF_TOKEN: ${HF_TOKEN:-}
    ports:
      - "18000:8000"
      - "18001:8001"
      - "18002:8002"
    volumes:
      - ./huggingface/.cache/huggingface:/root/.cache/huggingface
      - ./huggingface/model_repository:/models
    command:
      - /bin/bash
      - -c
      - exec tritonserver --model-repository=/models
